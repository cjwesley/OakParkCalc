<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oak Park Education Investment Calculator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-bg:#f5f6f8;--color-surface:#ffffff;--color-primary:#1a4d8f;
  --color-primary-light:#e8f0fe;--color-text:#1a1a2e;--color-text-muted:#5a5a7a;
  --color-border:#dde1e8;--color-accent:#2e7d32;--color-highlight:#fff8e1;
  --color-danger:#c0392b;--color-danger-light:#fdf0ef;
  --radius:3px;--shadow:0 2px 8px rgba(0,0,0,0.08);
}
@media(prefers-color-scheme:dark){:root{
  --color-bg:#121218;--color-surface:#1e1e2a;--color-primary:#6fa8f5;
  --color-primary-light:#1e2a3e;--color-text:#e4e4ee;--color-text-muted:#9a9ab4;
  --color-border:#2e2e42;--color-accent:#66bb6a;--color-highlight:#2a2818;
  --color-danger:#e57373;--color-danger-light:#2a1e1e;
  --shadow:0 2px 8px rgba(0,0,0,0.3);
}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--color-bg);color:var(--color-text);line-height:1.5;overflow-x:hidden}
.app{max-width:960px;margin:0 auto;padding:2rem 1rem;overflow-x:hidden}
.app-header{text-align:center;margin-bottom:2rem}
.header-row{display:flex;align-items:center;justify-content:center;gap:1rem;position:relative}
.header-row .reset-button{position:absolute;right:0}
.app-header h1{font-size:1.75rem;color:var(--color-primary);margin-bottom:0.25rem}
.subtitle{color:var(--color-text-muted);font-size:0.95rem}
.intro-text{max-width:580px;margin:0.75rem auto 0;font-size:0.9rem;color:var(--color-text-muted);line-height:1.5}
.reset-button{background:none;border:1px solid var(--color-border);border-radius:6px;color:var(--color-text-muted);font-size:0.8rem;padding:0.3rem 0.75rem;cursor:pointer}
.reset-button:hover{border-color:var(--color-primary);color:var(--color-primary)}

.app-layout{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.input-panel{grid-row:1;grid-column:1}
.results-panel{grid-row:1;grid-column:2}
.gap-section{grid-row:2;grid-column:1/-1}

.input-panel,.results-panel,.gap-section{
  background:var(--color-surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.5rem;
}
.input-panel h2,.results-panel h2,.gap-section h2{font-size:1.15rem;margin-bottom:1rem;color:var(--color-primary)}

.input-label{display:block;font-size:0.85rem;font-weight:600;color:var(--color-text-muted);margin-bottom:1rem}
.value-row{display:flex;align-items:center;gap:0.25rem;margin-top:0.35rem}
.dollar-sign{font-size:1.4rem;font-weight:700;color:var(--color-text)}
.value-display{font-size:1.4rem;font-weight:700;color:var(--color-text)}
.slider{width:100%;margin-top:0.5rem;accent-color:var(--color-primary)}
.slider-labels{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--color-text-muted)}

.hero-numbers{display:flex;gap:1rem;margin-bottom:1.5rem}
.hero-card{flex:1;background:var(--color-primary-light);border-radius:var(--radius);padding:1.25rem 1rem;text-align:center}
.hero-card.danger{background:var(--color-danger-light)}
.hero-amount{display:block;font-size:2rem;font-weight:800;color:var(--color-primary);line-height:1.1}
.hero-card.danger .hero-amount{color:var(--color-danger)}
.hero-card.payback-good{background:var(--color-primary-light)}
.hero-card.payback-good .hero-amount{color:var(--color-primary)}
.hero-label{font-size:0.85rem;color:var(--color-text-muted);margin-top:0.25rem}

.breakdown h3{font-size:0.95rem;margin-bottom:0.5rem;color:var(--color-text-muted)}
.breakdown-table{width:100%;border-collapse:collapse;font-size:0.85rem;table-layout:fixed;word-wrap:break-word}
.breakdown-table td{padding:0.4rem 0;border-bottom:1px solid var(--color-border)}
.breakdown-table .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.highlight-row td{background:var(--color-highlight);font-weight:700}
.section-label td{font-weight:700;font-size:0.8rem;color:var(--color-primary);padding-top:0.75rem;border-bottom:none;text-transform:uppercase;letter-spacing:0.03em}

.gap-bar-track{width:100%;height:24px;background:var(--color-border);border-radius:12px;overflow:hidden;position:relative;margin:1rem 0 0.5rem}
.gap-bar-fill{height:100%;border-radius:12px;transition:width 0.4s ease;display:flex;align-items:center;justify-content:center}
.gap-bar-fill span{font-size:0.65rem;font-weight:700;color:#fff;white-space:nowrap}
.gap-bar-labels{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--color-text-muted)}
.gap-desc{font-size:0.85rem;color:var(--color-text-muted);margin-top:0.75rem;line-height:1.5}

.app-footer{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--color-border);text-align:center}
.app-footer p{font-size:0.78rem;color:var(--color-text-muted);max-width:640px;margin:0 auto}
.app-footer a{color:var(--color-primary);text-decoration:none}
.app-footer a:hover{text-decoration:underline}

@media(max-width:700px){
  .app{padding:1rem 0.75rem}
  .app-header{margin-bottom:1.25rem}
  .app-header h1{font-size:1.15rem}
  .subtitle{font-size:0.85rem}
  .intro-text{font-size:0.82rem}
  .header-row{flex-direction:column;gap:0.5rem}
  .header-row .reset-button{position:static}
  .app-layout{grid-template-columns:1fr;gap:1rem}
  .input-panel,.results-panel,.gap-section{grid-row:auto;grid-column:auto}
  .input-panel,.results-panel,.gap-section{padding:1rem}
  .hero-numbers{flex-direction:column;gap:0.5rem;margin-bottom:1rem}
  .hero-card{padding:0.75rem 0.5rem}
  .hero-amount{font-size:1.5rem}
  .hero-label{font-size:0.78rem}
  .breakdown-table{font-size:0.8rem}
  .breakdown-table td{padding:0.3rem 0}
  .value-display,.dollar-sign{font-size:1.1rem}
  .app-footer p{font-size:0.72rem}
  .gap-bar-labels{font-size:0.7rem}
}
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
"use strict";
var e = React.createElement;
var useState = React.useState;
var useMemo = React.useMemo;

var D97_PER_PUPIL = 22199;
var D200_PER_PUPIL = 25135;
var D97_YEARS = 9;
var D200_YEARS = 4;
var TOTAL_SCHOOL_YEARS = D97_YEARS + D200_YEARS;
var BLENDED_PER_PUPIL = Math.round(
  (D97_PER_PUPIL * D97_YEARS + D200_PER_PUPIL * D200_YEARS) / TOTAL_SCHOOL_YEARS
);

/** Cook County property tax constants (2024 tax year) */
var ASSESSMENT_RATIO = 0.10;
var EQUALIZATION_MULTIPLIER = 3.0355;
var HOMEOWNER_EXEMPTION = 10000;
/** D97 total rate per $100 EAV (2024 Cook County Clerk) */
var D97_TAX_RATE = 4.397050;
/** D200 total rate per $100 EAV (2024 Cook County Clerk) */
var D200_TAX_RATE = 2.706722;
var COMBINED_EDUCATION_RATE = D97_TAX_RATE + D200_TAX_RATE;
/** Composite rate of all non-school taxing bodies per $100 EAV (2024 Cook County Clerk) */
var NON_SCHOOL_RATE = 2.2036 + 0.5455 + 0.2711 + 0.2708 + 0.3905 + 0.0686 + 0.3404; /* Village, Park Dist, Township, Triton, County, Forest Preserve, Metro Water */
var TOTAL_COMPOSITE_RATE = COMBINED_EDUCATION_RATE + NON_SCHOOL_RATE;
var MEDIAN_HOME = 465000;

function fmt(n) {
  return "$" + Math.round(n).toLocaleString("en-US");
}

function InputPanel(props) {
  return e("div", {className: "input-panel"},
    e("h2", null, "Your Household"),
    e("label", {className: "input-label"},
      "Children in public school",
      e("div", {className: "value-row"},
        e("span", {className: "value-display"}, props.kids)
      ),
      e("input", {type: "range", className: "slider", min: 1, max: 6, step: 1, value: props.kids, onChange: function(ev) { props.setKids(+ev.target.value); }}),
      e("div", {className: "slider-labels"}, e("span", null, "1"), e("span", null, "6"))
    ),
    e("label", {className: "input-label"},
      "Home market value",
      e("div", {className: "value-row"},
        e("span", {className: "dollar-sign"}, "$"),
        e("span", {className: "value-display"}, props.homeValue.toLocaleString("en-US"))
      ),
      e("input", {type: "range", className: "slider", min: 200000, max: 1500000, step: 25000, value: props.homeValue, onChange: function(ev) { props.setHomeValue(+ev.target.value); }}),
      e("div", {className: "slider-labels"}, e("span", null, "$200K"), e("span", null, "$1.5M"))
    ),
    e("label", {className: "input-label"},
      "Years in Oak Park",
      e("div", {className: "value-row"},
        e("span", {className: "value-display"}, props.years)
      ),
      e("input", {type: "range", className: "slider", min: 5, max: 40, step: 1, value: props.years, onChange: function(ev) { props.setYears(+ev.target.value); }}),
      e("div", {className: "slider-labels"}, e("span", null, "5"), e("span", null, "40"))
    )
  );
}

function ResultsPanel(props) {
  var r = props.results;
  return e("div", {className: "results-panel"},
    e("h2", null, "Education Investment"),
    e("div", {className: "hero-numbers"},
      e("div", {className: "hero-card"},
        e("span", {className: "hero-amount"}, fmt(r.annualEducationTax)),
        e("span", {className: "hero-label"}, "your annual D97/D200 taxes")
      )
    ),
    e("div", {className: "breakdown"},
      e("h3", null, "Calculation breakdown"),
      e("table", {className: "breakdown-table"},
        e("tbody", null,
          e("tr", {className: "section-label"}, e("td", {colSpan: 2}, "Your EAV (Cook County method)")),
          e("tr", null, e("td", null, "Assessed value (10% of market)"), e("td", {className: "num"}, fmt(r.assessedValue))),
          e("tr", null, e("td", null, "Equalized value (\u00d7 3.0355)"), e("td", {className: "num"}, fmt(r.equalizedValue))),
          e("tr", null, e("td", null, "Homeowner exemption"), e("td", {className: "num"}, "-" + fmt(HOMEOWNER_EXEMPTION))),
          e("tr", {className: "highlight-row"}, e("td", null, "Adjusted EAV"), e("td", {className: "num"}, fmt(r.adjustedEAV))),
          e("tr", {className: "section-label"}, e("td", {colSpan: 2}, "What you pay")),
          e("tr", null, e("td", null, "Total property tax (all bodies)"), e("td", {className: "num"}, fmt(r.annualTotalPropertyTax) + "/yr")),
          e("tr", null, e("td", null, "D97 taxes (rate: " + D97_TAX_RATE.toFixed(2) + "/$100)"), e("td", {className: "num"}, fmt(r.annualD97Tax) + "/yr")),
          e("tr", null, e("td", null, "D200 taxes (rate: " + D200_TAX_RATE.toFixed(2) + "/$100)"), e("td", {className: "num"}, fmt(r.annualD200Tax) + "/yr")),
          e("tr", {className: "highlight-row"}, e("td", null, "Total education taxes (" + props.years + " yrs)"), e("td", {className: "num"}, fmt(r.totalEducationTaxPaid))),
          e("tr", {className: "section-label"}, e("td", {colSpan: 2}, "What the community spends")),
          e("tr", null, e("td", null, "D97 per pupil (K\u20138, 9 yrs)"), e("td", {className: "num"}, fmt(D97_PER_PUPIL) + "/yr")),
          e("tr", null, e("td", null, "D200 per pupil (9\u201312, 4 yrs)"), e("td", {className: "num"}, fmt(D200_PER_PUPIL) + "/yr")),
          e("tr", null, e("td", null, "Blended K\u201312 average"), e("td", {className: "num"}, fmt(BLENDED_PER_PUPIL) + "/yr")),
          e("tr", {className: "highlight-row"}, e("td", null, "Total spent on " + props.kids + " child" + (props.kids > 1 ? "ren" : "") + " (K\u201312)"), e("td", {className: "num"}, fmt(r.totalSpentOnKids)))
        )
      )
    )
  );
}

function GapSection(props) {
  var r = props.results;
  var pct = r.totalSpentOnKids > 0 ? (r.totalEducationTaxPaid / r.totalSpentOnKids) * 100 : 0;
  return e("div", {className: "gap-section"},
    e("h2", null, "The Social Contract Gap"),
    e("div", {className: "hero-numbers"},
      e("div", {className: "hero-card"},
        e("span", {className: "hero-amount"}, fmt(r.totalEducationTaxPaid)),
        e("span", {className: "hero-label"}, "what you paid in education taxes")
      ),
      e("div", {className: "hero-card"},
        e("span", {className: "hero-amount"}, fmt(r.totalSpentOnKids)),
        e("span", {className: "hero-label"}, "what the community spent educating your kids")
      ),
      e("div", {className: "hero-card danger"},
        e("span", {className: "hero-amount"}, fmt(r.gap)),
        e("span", {className: "hero-label"}, "the gap")
      )
    ),
    e("div", {className: "gap-bar-track"},
      e("div", {className: "gap-bar-fill", style: {width: Math.min(pct, 100) + "%", background: "var(--color-primary)"}},
        pct > 18 ? e("span", null, "What you paid") : null
      )
    ),
    e("div", {className: "gap-bar-labels"},
      e("span", null, fmt(r.totalEducationTaxPaid) + " paid"),
      e("span", null, fmt(r.totalSpentOnKids) + " spent")
    ),
    e("p", {className: "gap-desc"},
      "This is how much the community invested in your children\u2019s education beyond what you paid in school taxes. When families leave after graduation, this investment leaves with them. Zoning reform that creates housing for empty nesters helps keep them \u2014 and their tax dollars \u2014 here."
    ),
    e("div", {className: "hero-numbers", style: {marginTop: "1.5rem"}},
      e("div", {className: r.yearsToPayback > 5 ? "hero-card danger" : "hero-card payback-good"},
        e("span", {className: "hero-amount"}, r.yearsToPayback + " yrs"),
        e("span", {className: "hero-label"}, "to pay back the full cost of your kids\u2019 education")
      )
    ),
    e("p", {className: "gap-desc"},
      "At " + fmt(r.annualEducationTax) + "/yr in education taxes, it would take " + r.yearsToPayback + " years of living in Oak Park to fully pay back what the community spent educating your children."
    )
  );
}

function OakParkEducationCalculator() {
  var kidsState = useState(2);
  var kids = kidsState[0], setKids = kidsState[1];
  var homeState = useState(MEDIAN_HOME);
  var homeValue = homeState[0], setHomeValue = homeState[1];
  var yearsState = useState(20);
  var years = yearsState[0], setYears = yearsState[1];

  var results = useMemo(function() {
    /* Cook County EAV-based calculation */
    var assessedValue = homeValue * ASSESSMENT_RATIO;
    var equalizedValue = assessedValue * EQUALIZATION_MULTIPLIER;
    var adjustedEAV = Math.max(0, equalizedValue - HOMEOWNER_EXEMPTION);
    var annualD97Tax = adjustedEAV * D97_TAX_RATE / 100;
    var annualD200Tax = adjustedEAV * D200_TAX_RATE / 100;
    var annualEducationTax = annualD97Tax + annualD200Tax;
    var annualTotalPropertyTax = adjustedEAV * TOTAL_COMPOSITE_RATE / 100;
    var totalEducationTaxPaid = annualEducationTax * years;
    var totalSpentOnKids = kids * TOTAL_SCHOOL_YEARS * BLENDED_PER_PUPIL;
    var gap = totalSpentOnKids - totalEducationTaxPaid;
    var yearsToPayback = annualEducationTax > 0 ? Math.ceil(totalSpentOnKids / annualEducationTax) : 0;
    return {assessedValue: assessedValue, equalizedValue: equalizedValue, adjustedEAV: adjustedEAV, annualTotalPropertyTax: annualTotalPropertyTax, annualD97Tax: annualD97Tax, annualD200Tax: annualD200Tax, annualEducationTax: annualEducationTax, totalEducationTaxPaid: totalEducationTaxPaid, totalSpentOnKids: totalSpentOnKids, gap: gap, yearsToPayback: yearsToPayback};
  }, [kids, homeValue, years]);

  function handleReset() {
    setKids(2);
    setHomeValue(MEDIAN_HOME);
    setYears(20);
  }

  return e("div", {className: "app"},
    e("header", {className: "app-header"},
      e("div", {className: "header-row"},
        e("h1", null, "Oak Park Education Investment Calculator"),
        e("button", {className: "reset-button", onClick: handleReset}, "Reset")
      ),
      e("p", {className: "intro-text"},
        "Public schools are funded by the entire community for the benefit of the community. This calculator shows the ",
        e("strong", null, "gap between what a family pays in education taxes and what it costs to educate their children"),
        " \u2014 and what happens to that investment when families leave Oak Park after graduation."
      )
    ),
    e("main", {className: "app-layout"},
      e(InputPanel, {kids: kids, setKids: setKids, homeValue: homeValue, setHomeValue: setHomeValue, years: years, setYears: setYears}),
      e(ResultsPanel, {results: results, kids: kids, years: years}),
      e(GapSection, {results: results})
    ),
    e("footer", {className: "app-footer"},
      e("p", null,
        "Per-pupil expenditures: D97 " + fmt(D97_PER_PUPIL) + "/yr \u00b7 D200 " + fmt(D200_PER_PUPIL) + "/yr. Tax rates use Cook County EAV method (10% assessment \u00d7 3.0355 equalizer \u2212 $10K homeowner exemption). Sources: ",
        e("a", {href: "https://www.illinoisreportcard.com/district.aspx?districtid=06016097002&source=environment&source2=sber", target: "_blank", rel: "noopener"}, "D97 Illinois Report Card"),
        " \u00b7 ",
        e("a", {href: "https://www.illinoisreportcard.com/District.aspx?districtId=06016200013", target: "_blank", rel: "noopener"}, "D200 Illinois Report Card"),
        " \u00b7 ",
        e("a", {href: "https://www.cookcountyclerkil.gov/property-taxes/tax-extension-and-rates", target: "_blank", rel: "noopener"}, "2024 Cook County Clerk Tax Rates"),
        " (D97: " + D97_TAX_RATE.toFixed(2) + "/$100 EAV, D200: " + D200_TAX_RATE.toFixed(2) + "/$100 EAV). This is an estimate for informational purposes only."
      )
    )
  );
}

var root = ReactDOM.createRoot(document.getElementById("root"));
root.render(e(OakParkEducationCalculator));
  </script>
</body>
</html>
